services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: paper-agent-postgres
    environment:
      POSTGRES_DB: paper_agent
      POSTGRES_USER: paper_agent
      POSTGRES_PASSWORD: ${CLUSTER__DATABASE__PASSWORD:-paper_agent123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # Redis for Cache + Task Queue
  redis:
    image: redis:7-alpine
    container_name: paper-agent-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: paper-agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - backend

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paper-agent-backend
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Shanghai
      PAPER_AGENT_SECRET_KEY: ${PAPER_AGENT_SECRET_KEY:-change-me-in-production}
      CLUSTER__ENABLE_CLUSTERING: "true"
      CLUSTER__NODE_ROLE: "api"
      CLUSTER__DATABASE__TYPE: postgresql
      CLUSTER__DATABASE__HOST: postgres
      CLUSTER__DATABASE__PORT: 5432
      CLUSTER__DATABASE__NAME: paper_agent
      CLUSTER__DATABASE__USER: paper_agent
      CLUSTER__DATABASE__PASSWORD: ${CLUSTER__DATABASE__PASSWORD:-paper_agent123}
      CLUSTER__REDIS__ENABLED: "true"
      CLUSTER__REDIS__HOST: redis
      CLUSTER__REDIS__PORT: 6379
      CLUSTER__STORAGE__ENABLED: "true"
      CLUSTER__STORAGE__PROVIDER: minio
      CLUSTER__STORAGE__ENDPOINT: http://minio:9000
      CLUSTER__STORAGE__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      CLUSTER__STORAGE__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      CLUSTER__TASK_QUEUE__TYPE: redis
    volumes:
      - ./data/vector_db:/app/data/vector_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend

  # Worker (Task Processor)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paper-agent-worker
    environment:
      TZ: Asia/Shanghai
      CLUSTER__ENABLE_CLUSTERING: "true"
      CLUSTER__NODE_ROLE: "worker"
      CLUSTER__DATABASE__TYPE: postgresql
      CLUSTER__DATABASE__HOST: postgres
      CLUSTER__DATABASE__PORT: 5432
      CLUSTER__DATABASE__NAME: paper_agent
      CLUSTER__DATABASE__USER: paper_agent
      CLUSTER__DATABASE__PASSWORD: ${CLUSTER__DATABASE__PASSWORD:-paper_agent123}
      CLUSTER__REDIS__ENABLED: "true"
      CLUSTER__REDIS__HOST: redis
      CLUSTER__REDIS__PORT: 6379
      CLUSTER__STORAGE__ENABLED: "true"
      CLUSTER__STORAGE__PROVIDER: minio
      CLUSTER__STORAGE__ENDPOINT: http://minio:9000
      CLUSTER__STORAGE__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      CLUSTER__STORAGE__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      CLUSTER__TASK_QUEUE__TYPE: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: 2
    networks:
      - backend

  # Frontend
  frontend:
    build:
      context: paper_agent/frontend
      dockerfile: Dockerfile
    container_name: paper-agent-frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - frontend

networks:
  backend:
    driver: bridge
    internal: false
  frontend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
