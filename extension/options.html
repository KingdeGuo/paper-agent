<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Paper Agent Extension Settings</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; color: #1e293b; }
    h1 { font-size: 24px; margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin-top: 16px; margin-bottom: 4px; font-size: 14px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    .help { font-size: 12px; color: #64748b; margin-top: 4px; }
    button { margin-top: 24px; padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .saved { display: none; background: #dcfce7; color: #166534; padding: 12px; border-radius: 8px; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>⚙️ Paper Agent Settings</h1>

  <label>Server URL</label>
  <input id="serverUrl" type="url" placeholder="http://localhost:8000" />
  <div class="help">The URL of your Paper Agent backend server</div>

  <label>Frontend URL</label>
  <input id="frontendUrl" type="url" placeholder="http://localhost:3000" />
  <div class="help">The URL of your Paper Agent frontend</div>

  <label>API Token (optional)</label>
  <input id="token" type="password" placeholder="Leave blank for no auth" />
  <div class="help">Generate an API token from Paper Agent settings</div>

  <label>Auto-import on arxiv.org</label>
  <select id="autoImport">
    <option value="ask">Ask me each time</option>
    <option value="always">Always import</option>
    <option value="never">Never</option>
  </select>

  <button id="saveBtn">Save Settings</button>
  <div id="saved" class="saved">✅ Settings saved</div>

  <script src="options.js"></script>
</body>
</html>
