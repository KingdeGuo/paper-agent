# Welcome new contributors
name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    name: 👋 Welcome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            🎉 Thanks for opening your first issue in Paper Agent!

            We appreciate your contribution. Here are some tips:
            - Search existing issues before posting
            - Provide as much context as possible
            - Include steps to reproduce if it's a bug

            The community will review your issue shortly!
          pr-message: |
            🎉 Welcome! Thank you for opening your first pull request in Paper Agent!

            A maintainer will review your changes soon. In the meantime:
            - Ensure all CI checks pass
            - Add tests for new functionality
            - Update documentation if needed
            - Follow the coding style in CONTRIBUTING.md

            Thanks again for contributing to open-source research! 🦞
