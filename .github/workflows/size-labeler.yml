# Label PRs by size
name: Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  size-label:
    name: 📏 Label by Size
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        continue-on-error: true
      - name: Label PR size
        uses: coverallsapp/pr-size-labeler@v1
        continue-on-error: true
