# Paper Agent 配置文件
# 请根据需要修改以下配置项

llm:
  # LLM提供商，可选值: "huggingface", "openai", "anthropic", "qwen", "deepseek", "ollama"
  provider: "openai"
  
  # OpenAI配置
  model: "gpt-3.5-turbo"
  api_key: "your_openai_api_key"
  
  # Qwen (通义千问) 配置
  qwen_api_key: "your_qwen_api_key"
  qwen_model: "qwen-plus"
  
  # DeepSeek配置
  deepseek_api_key: "your_deepseek_api_key"
  deepseek_model: "deepseek-chat"
  
  # Ollama配置
  ollama_model: "llama3"
  ollama_base_url: "http://localhost:11434/v1"
  
  # Anthropic配置
  anthropic_api_key: "your_anthropic_api_key"
  anthropic_model: "claude-3-haiku-20240307"
  
  # 模型参数
  temperature: 0.7
  max_tokens: 1000

embedding:
  model: "all-MiniLM-L6-v2"
  dimension: 384

vector_db:
  provider: "chromadb"
  path: "./data/vector_db"

pdf_processing:
  max_pages: 100
  extract_images: false
  chunk_size: 1000
  chunk_overlap: 200

server:
  host: "0.0.0.0"
  port: 8000
  debug: false

storage:
  pdf_path: "./data/pdfs"
  max_file_size: 50MB
  allowed_extensions: [".pdf"]