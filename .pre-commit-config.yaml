# Pre-commit hooks for Paper Agent
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=2000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix, --ignore=E402,E501,F811,F841,W291, --line-length=120]
        files: ^paper_agent/backend/

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.0.0
    hooks:
      - id: eslint
        files: ^paper_agent/frontend/src/
        types: [file]
        args: [--fix, --max-warnings=100]
        additional_dependencies:
          - eslint@8
          - '@typescript-eslint/eslint-plugin'

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^paper_agent/frontend/src/
        types_or: [javascript, jsx, typescript, tsx, json, css, md]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.13
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: .*/tests/.*|.*\.md$
