# Ingress for Paper Agent
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paper-agent-ingress
  namespace: paper-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - paper-agent.example.com  # Replace with your domain
      secretName: paper-agent-tls
  rules:
    - host: paper-agent.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: paper-agent-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paper-agent-frontend
                port:
                  number: 80
